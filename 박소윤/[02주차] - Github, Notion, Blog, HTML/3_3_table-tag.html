<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Table tag</title>
    <style>
      table {
        border: 1px solid black;
        border-collapse: collapse;
      }
      th,
      td {
        border: solid black;
        padding: 12px;
      }
    </style>
  </head>
  <body>
    <h1>Table 기본</h1>
    <table>
      <caption>
        프로필 테이블
      </caption>
      <tr>
        <th>이름</th>
        <th>취미</th>
        <th>특기</th>
      </tr>
      <tr>
        <td>홍길동</td>
        <td>도술</td>
        <td>축지법</td>
      </tr>
      <tr>
        <td>짐코딩</td>
        <td>헬스</td>
        <td>코딩</td>
      </tr>
    </table>
    <hr />
    <h1>table 그룹 태그</h1>
    <table>
      <caption>
        학급 점수
      </caption>
      <colgroup>
        <col width="40px" />
        <col />
        <col />
        <col />
        <col />
        <col />
        <col />
      </colgroup>
      <thead>
        <tr>
          <th>반</th>
          <th>이름</th>
          <th>국어</th>
          <th>영어</th>
          <th>수학</th>
          <th>코딩</th>
        </tr>
      </thead>
      <tbody>
        <tr>
          <td>1반</td>
          <td>홍길동</td>
          <td>90점</td>
          <td>100점</td>
          <td>90점</td>
          <td>81점</td>
        </tr>
        <tr>
          <td>1반</td>
          <td>짐코딩</td>
          <td>85점</td>
          <td>81점</td>
          <td>95점</td>
          <td>100점</td>
        </tr>
      </tbody>

      <tfoot>
        <td>1반</td>
        <td>평균</td>
        <td>87.5</td>
        <td>90.5점</td>
        <td>92.5</td>
        <td>90.5</td>
      </tfoot>
      <tr></tr>
    </table>
  </body>
</html>
