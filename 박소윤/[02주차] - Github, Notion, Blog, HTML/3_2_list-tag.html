<!DOCTYPE html>
<html lang="en">
   <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>List tag/title>
   </head>
   <body>
    <h1>김치볶음밥</h1>
    <ol>

     <li>1.프라이팬을 살짝 달군 뒤 식용유(혹은 버터)를 두른다.</li>
     <li>2.프라이팬의 온도가 적당히 올라가면 계란을 깨서 넣는다.</li>
     <li>3.타지 않도록 최대한 주의한다.</li>
     <li>4. 아래의 익은 정도의 취향에 따라 뒤집으면서 굽는다.</li>
     <li>5. 취향에 따라 소금 등의 조미료나 향신료를 넣는다.</li>
     <li>6. 익었으면 꺼내서 접시에 담는다.</li>
    </ol>
    <h1> 헬스 3대 운동 </h1>
    <ul>
      <li>벤치프레스 </li>
      <li>데드리프트</li>
      <li>스쿼트</li>
    </ul>
    <hr />
    <h1>웹 개발 입문 과목</h1>
    <dl>
      <dt>HTML</dt>
      <dd>Hyper Text markup Language<br /> 약자로 문서 만들기 위한 <strong>마크업언어</strong></dd>
      <dt>CSS</dt>
      <dd>Cascading Style Sheets의 <br />의 약자로 HTML을 꾸며주는 시트이다.</dd>
      <dt>JavaScript</dt>
      <dd>웹 페이지를 생동감 있게 동작시키기 위한<br /><b>프로그래밍 언어</b>이다.</dd>
    </dl>
   </body>
</html>
