<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>table Tag</title>
    <style>
      table {
        border: 1px solid black;
        border-collapse: collapse;
      }
      th,
      td {
        border: 1px solid black;
        padding: 12px;
      }
      .col1 {
        width: 100px;
        background-color: skyblue;
      }
    </style>
  </head>
  <body>
    <h1>테이블 기본</h1>
    <table>
      <caption>
        프로필 테이블
      </caption>
      <tr>
        <th>이름</th>
        <th>취미</th>
        <th>특기</th>
      </tr>
      <tr>
        <td>홍길동</td>
        <td>도술</td>
        <td>축지법</td>
      </tr>
      <tr>
        <td>지원근</td>
        <td>게임</td>
        <td>코딩</td>
      </tr>
    </table>
    <hr />
    <h1>평균 학점</h1>
    <table>
      <colgroup>
        <col class="col1" />
        <col class="col2" />
        <col class="col3" />
        <col class="col4" />
        <col class="col5" />
      </colgroup>

      <caption>
        전공
      </caption>
      <tr>
        <th>이름</th>
        <th>JAVA</th>
        <th>Simulation</th>
        <th>Digital Sience</th>
        <th>P/F</th>
      </tr>
      <tbody>
        <tr>
          <td>홍길동</td>
          <td>A0</td>
          <td>A+</td>
          <td>C0</td>
          <td rowspan="3">P</td>
        </tr>
        <tr>
          <td>지원근</td>
          <td>A+</td>
          <td>A+</td>
          <td>A+</td>
        </tr>
        <tr>
          <td>로꼬</td>
          <td>C0</td>
          <td>A0</td>
          <td>B+</td>
        </tr>
      </tbody>
      <tfoot>
        <tr>
          <th>평균</th>
          <th>3.5</th>
          <th>4.3</th>
          <th>3.3</th>
          <th>P</th>
        </tr>
      </tfoot>
    </table>
  </body>
</html>
