<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Selector Attribute</title>
  </head>
  <style>
    /* 속성이 존재하는 요소 */
    h2[class] {
      color: aqua;
      font-size: 30px;
    }
    [target] {
      color: cadetblue;
    }
    /* 속성값과 일치하는 요소 */
    h2[class='google'] {
      color: chocolate;
    }
    /* 속성값을 포함하는 요소 *= 'www' 포함하는 것을 지정 */
    a[href*='www'] {
      color: darkcyan;
      text-decoration: none;
    }
    /* 속성 값으로 시작하는 요소 */
    h2[class^='nav'] {
      color: blue;
    }
    /* 속성 값으로 끝나는 요소 */
    a[href$='gram.com'] {
      color: red;
    }
    /* 속성에 단어가 포함하는 요소 */
    h2[class~='title'] {
      color: red;
    }
  </style>
  <body>
    <h2 class="naver">네이버</h2>
    <a href="https://www.naver.com">네이버</a>
    <h2 class="google">구글</h2>
    <a href="https://www.google.com" , target="_blank">구글</a>
    <h2 class="instagram">인스타그램</h2>
    <a href="https://www.instagram.com">인스타그램</a>
    <h2 class="ex title 1">지원근</h2>
    <h2 class="ex title 2">가나다</h2>
    <h2 class="ex title 3">라마하</h2>
    <h2 class="ex title 4">자차카</h2>
  </body>
</html>
