<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Font</title>
  </head>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@100..900&display=swap');
    html {
      /* font-family: serif, monospace; */
      font-family: 'Noto Sans KR', sans-serif;
    }
    .title {
      font-size: 20px;
    }
    .instance {
      font-size: 15px;
    }
    .italic {
      font-style: italic;
    }
    .weith-bold {
      font-weight: bold;
    }
    .weith-300 {
      font-weight: 300;
    }
    .font-variant {
      font-variant: small-caps;
    }
    .subtitle {
      font-size: 16px;
    }
    .subtitle-rem {
      font-size: 2rem;
    }
    .subtitle-em {
      font-size: 2em;
    }
    .parents {
      font-size: 10px;
    }
    .viewport.width {
      width: 10vw;
      height: 100px;
      background-color: red;
    }
    .viewport.height {
      width: 100px;
      height: 20vh;
      background-color: chartreuse;
    }
  </style>
  <body>
    <h2 class="title">Title</h2>
    <p class="instatnce">instatnce</p>
    <hr />
    <p class="instatnce italic">instatnce</p>
    <p class="instatnce weith-bold">instatnce</p>
    <p class="instatnce weith-300">instatnce</p>
    <p class="font-variant">HELLO, jiwongeun</p>
    <h2>px</h2>
    <p class="subtitle">실용적인 코드를 배우고있습니다</p>
    <h2>rem</h2>
    <p class="subtitle-rem">실용적인 코드를 배우고있습니다</p>
    <h2>em</h2>
    <div class="parents">
      <p class="subtitle-em">실용적인 코드를 배우고있습니다</p>
    </div>

    <hr />
    <!-- viewport width-->
    <h2>vw</h2>
    <div class="viewport width"></div>
    <!-- viewport height-->
    <h2>vh</h2>
    <div class="viewport height"></div>
  </body>
</html>
