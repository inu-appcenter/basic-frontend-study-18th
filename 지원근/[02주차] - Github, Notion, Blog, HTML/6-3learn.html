<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>radio&checkbox</title>
  </head>
  <body>
    <form action="">
      <fieldset>
        <legend>좋아하는 색깔</legend>
        <ul>
          <li>
            <label for="red">빨강</label>
            <input type="checkbox" id="red" value="red" />
          </li>
          <li>
            <label for="orange">주황</label>
            <input type="checkbox" id="orange" value="orange" />
          </li>
          <li>
            <label for="yellow">노랑</label>
            <input type="checkbox" id="yellow" value="yellow" />
          </li>
          <li>
            <label for="green">초록</label>
            <input type="checkbox" id="green" value="green" />
          </li>
          <li>
            <label for="blue">파랑</label>
            <input type="checkbox" id="blue" value="blue" />
          </li>
        </ul>
      </fieldset>
      <fieldset>
        <legend>배송방법은?</legend>
        <ul>
          <li>
            <label for="free">무료</label>
            <input type="radio" id="free" value="free" />
          </li>
          <li>
            <label for="pay">유료</label>
            <input type="radio" id="pay" value="pay" />
          </li>
        </ul>
      </fieldset>
      <fieldset>
        <legend>자기소개서</legend>
        <textarea name="" id="" cols="15" rows="5">default</textarea>
      </fieldset>
      <fieldset>
        <legend>주문상품 선택</legend>
        <ul>
          <li>
            <select name="goods" id="goods">
              <option value="apple_10KG">사과 10키로</option>
              <option value="apple_20KG">사과 20키로</option>
              <option value="apple_30KG">사과 30키로</option>
              <option value="apple_40KG">사과 40키로</option>
              <option value="apple_50KG">사과 50키로</option>
            </select>
          </li>
        </ul>
      </fieldset>
      <button type="submit">제출하기</button>
      <button type="reset">초기화</button>
      <button type="button" onclick="alert('누르지마')">버튼</button>
    </form>
  </body>
</html>
