<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>img media</title>
    <style>
      div {
        width: 100px;
        height: 100px;
        background-color: chartreuse;
        border: 1px solid darkslategray;
      }
    </style>
  </head>
  <body>
    <h2>이미지 태그</h2>
    <img width="200" src="../cat.jpg" alt="고양이" />
    <img height="100" src="../cat.jpg" alt="고양이" />
    <img height="120" src="butterfly.jpg" alt="나비" />

    <h2>오디오 태그</h2>
    <audio src="../assets/audio.mp3" controls></audio>

    <h2>비디오 태그</h2>
    <video
      width="400"
      src="../assets/video.mp4"
      controls
      types="video/mp4"
      poster="butterfly.jpg"
    ></video>

    <h2>하이퍼 링크</h2>
    <a href="http://www.naver.com">네이버</a>와
    <a href="http://google.com">구글</a>은 포털 사이트이다.
    <a href="#target">target으로 이동</a>
    <div>1</div>
    <div>2</div>
    <div>3</div>
    <div>4</div>

    <div>16</div>
    <div>17</div>

    <div>25</div>

    <div>27</div>
    <div>28</div>
    <div>29</div>
    <div>30</div>
  </body>
</html>
