<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Float</title>
    <style>
      .container {
        width: 600px;
        border: 1px solid grey;
      }
      img {
        width: 200px;
      }
      .float-left {
        float: left;
        margin-right: 10px;
        margin-bottom: 20px;
      }
      .float-right {
        float: right;
      }
      p {
        border: 1px solid blue;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <img class="float-left" src="../css 구조.png" alt="" />
      <p>
        css구조 오늘 배운 것. 사진 인터넷에서 다운로드함. 인라인 스타일 인터널
        스타일 익스터널 스타일 셀렉터 폰트 테이블 박스 모델 디스플레이 navbar
        float 등등 여러 가지 배웠음
      </p>
      <img class="float-right" src="../flower.jpg.jpg" alt="" />
      <p>
        꽃 사진 분홍 색 꽃을 확대하여 찍음 인터넷에서 다운로드함. 꽃 이름
        모르겠음 어디서 찍은 건지도 모르겠음 무료 이미지 봄에 피는 꽃으로 추정됨
        꽃가루 알레르기 비염 유발하는 원인
      </p>
    </div>
  </body>
</html>
